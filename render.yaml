# render.yaml — Render Blueprint for BookRAG
# Deploy: go to Render Dashboard → New → Blueprint → connect your GitHub repo.
# Render will detect this file automatically.
#
# AFTER FIRST DEPLOY: set GROQ_API_KEY manually (see comment on line 21).

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: bookrag-backend
    env: python                   # ← must be "env:", NOT "runtime:"
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false               # Set this manually: Dashboard → bookrag-backend → Environment → Add Env Var
      - key: SECRET_KEY
        generateValue: true       # Render auto-generates a cryptographically strong value
      - key: DATABASE_URL
        fromDatabase:
          name: bookrag-db
          property: connectionString
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma_store
      - key: ALLOWED_ORIGINS
        value: https://bookrag-frontend.onrender.com
      - key: LOG_LEVEL
        value: info
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
    disk:
      name: bookrag-vectors
      mountPath: /data/chroma_store
      sizeGB: 1

  # ── React Frontend (static site) ─────────────────────────────────────────────
  - type: web
    name: bookrag-frontend
    env: static                   # ← must be "env:", NOT "runtime:"
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://bookrag-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html  # SPA fallback

# ── PostgreSQL Database ───────────────────────────────────────────────────────
databases:
  - name: bookrag-db
    databaseName: bookrag
    user: bookrag_user
