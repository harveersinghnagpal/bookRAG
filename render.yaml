# render.yaml — Render Blueprint for BookRAG
# Deploy: push this file to your GitHub repo, then:
#   Render Dashboard → New → Blueprint → connect your repo
#
# IMPORTANT: After first deploy, manually set GROQ_API_KEY
# in the Render dashboard under bookrag-backend → Environment.

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: bookrag-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false               # Set manually in Render dashboard (keep it secret)
      - key: SECRET_KEY
        generateValue: true       # Render auto-generates a strong random key
      - key: DATABASE_URL
        fromDatabase:
          name: bookrag-db
          property: connectionString
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma_store
      - key: ALLOWED_ORIGINS
        value: https://bookrag-frontend.onrender.com  # update after frontend deploys
      - key: LOG_LEVEL
        value: info
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
    disk:
      name: bookrag-vectors
      mountPath: /data/chroma_store
      sizeGB: 1                   # upgrade if you plan to store many large books

  # ── React Frontend (static site) ─────────────────────────────────────────────
  - type: web
    name: bookrag-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://bookrag-backend.onrender.com  # update with your backend URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html  # SPA fallback so React Router works

# ── PostgreSQL Database ───────────────────────────────────────────────────────
databases:
  - name: bookrag-db
    plan: free
    databaseName: bookrag
    user: bookrag_user
