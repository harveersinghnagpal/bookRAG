# render.yaml — Render Blueprint for BookRAG
#
# HOW TO DEPLOY:
#   1. Push this file to GitHub (already done)
#   2. Render Dashboard → New → Blueprint
#   3. Connect your GitHub repo
#   4. Give any name e.g. "bookrag" when prompted
#   5. Click "Apply" — Render provisions everything automatically
#
# AFTER DEPLOY: manually set GROQ_API_KEY in the dashboard.
# (Dashboard → bookrag-backend service → Environment → Add Env Var)
#
# NOTE ON STORAGE: Free tier has no persistent disk.
# FAISS indexes are stored in /tmp and reset on each restart.
# Users simply re-upload their book; chat history is not affected.

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: bookrag-backend
    env: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false               # Set manually after deploy — never commit this to git
      - key: SECRET_KEY
        generateValue: true       # Render auto-generates a strong random secret
      - key: DATABASE_URL
        fromDatabase:
          name: bookrag-db
          property: connectionString
      - key: CHROMA_PERSIST_DIR
        value: /tmp/chroma_store  # Ephemeral on free tier — books must be re-uploaded after restart
      - key: ALLOWED_ORIGINS
        value: https://bookrag-frontend.onrender.com
      - key: LOG_LEVEL
        value: info
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

  # ── React Frontend (static site) ─────────────────────────────────────────────
  - type: web
    name: bookrag-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://bookrag-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL Database ───────────────────────────────────────────────────────
databases:
  - name: bookrag-db
    databaseName: bookrag
    user: bookrag_user
