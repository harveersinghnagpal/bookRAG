# render.yaml — No-Card Free Tier Blueprint
#
# HOW TO DEPLOY:
#   1. Give it ANY name (e.g., "bookrag")
#   2. Click "Apply"
#
# NOTE: Removed the Database and Disk sections to bypass Render's card check.
# This version uses local SQLite.
# WARNING: User accounts and uploaded books WILL be reset when the server restarts.

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: bookrag-backend
    env: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false               # Set manually in Dashboard -> Environment
      - key: SECRET_KEY
        generateValue: true
      - key: CHROMA_PERSIST_DIR
        value: /tmp/chroma_store
      - key: ALLOWED_ORIGINS
        value: https://bookrag-frontend.onrender.com
      - key: LOG_LEVEL
        value: info
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

  # ── React Frontend (static site) ─────────────────────────────────────────────
  - type: web
    name: bookrag-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://bookrag-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
